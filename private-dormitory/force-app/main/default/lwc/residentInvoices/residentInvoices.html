<template>
    <lightning-card title="Financial Statements" icon-name="standard:currency">
        <div class="slds-p-around_medium">
            <template if:true={isLoading}>
                <lightning-spinner alt="Loading..." size="small"></lightning-spinner>
            </template>

            <template if:true={hasInvoices}>
                <template for:each={invoices} for:item="inv">
                    <div key={inv.Id} class="slds-box slds-m-bottom_small slds-theme_shade">
                        <div class="slds-grid slds-grid_align-spread">
                            <span class="slds-text-title_bold">{inv.Name}</span>
                            <span class="slds-text-color_success slds-text-title_bold">
                                {inv.formattedAmount}
                            </span>
                        </div>
                        <div class="slds-grid slds-grid_align-spread slds-m-top_xx-small">
                            <span class="slds-text-body_small">Due: {inv.Due_Date__c}</span>
                            <lightning-badge 
                                label={inv.Status__c} 
                                variant={inv.badgeVariant}>
                            </lightning-badge>
                        </div>
                    </div>
                </template>
            </template>

            <template if:false={hasInvoices}>
                <div if:false={isLoading} class="slds-text-align_center slds-p-vertical_large">
                    <p>No invoices found.</p>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
