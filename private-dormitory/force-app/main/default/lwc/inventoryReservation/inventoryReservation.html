<template>
    <lightning-card title="Rent Inventory" icon-name="custom:custom18">
        <div class="slds-p-around_medium">
            <lightning-combobox
                name="inventory"
                label="What do you need?"
                value={selectedInventory}
                options={inventoryOptions}
                onchange={handleInventoryChange}
                placeholder="Select an item">
            </lightning-combobox>

            <lightning-input 
                type="date" 
                label="Select Date" 
                value={selectedDate}
                min={minDate}
                onchange={handleDateChange}
                class="slds-m-vertical_small">
            </lightning-input>

            <template if:true={slots}>
                <p class="slds-m-bottom_small">Available slots (you can select up to 2):</p>
                <div class="slds-grid slds-wrap slds-m-bottom_medium">
                    <template for:each={slots} for:item="slot">
                        <button key={slot.time} 
                                class={slot.btnClass} 
                                onclick={handleSlotSelect} 
                                data-time={slot.time}>
                            {slot.time}
                        </button>
                    </template>
                </div>
            </template>

            <div if:true={isReady} class="slds-m-top_large">
                <button class="slds-button slds-button_brand slds-button_stretch" 
                        onclick={handleReservation}>
                    Book for {reservationTimeRange}
                </button>
            </div>
        </div>
    </lightning-card>
</template>
