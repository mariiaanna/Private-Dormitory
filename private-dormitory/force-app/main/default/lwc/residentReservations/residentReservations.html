<template>
    <lightning-card title="My Reservations" icon-name="standard:event">
        <div class="slds-p-around_medium">
            <template if:true={reservations}>
                <template for:each={reservations} for:item="res">
                    <div key={res.Id} class="slds-box slds-m-bottom_small slds-theme_shade card-container">
                        <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                            <div>
                                <p class="slds-text-title_bold">{res.Inventory__r.Name}</p>
                                <p class="slds-text-body_small">{res.formattedTime}</p>
                            </div>
                            <div class="slds-text-align_right">
                                <lightning-button 
                                    label="Cancel" 
                                    variant="destructive-text"
                                    onclick={handleCancel}
                                    data-id={res.Id}
                                    class="cancel-btn">
                                </lightning-button>
                            </div>
                        </div>
                    </div>
                </template>
            </template>
            <template if:false={reservations}>
                <p class="slds-text-align_center slds-p-vertical_large">No active reservations.</p>
            </template>
        </div>
    </lightning-card>
</template>
